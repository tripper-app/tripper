<GridLayout [height]="screenHeight" [width]="screenWidth" backgroundColor="green" rows="*,2*,2*">
    <img src="res://icon" row="1"/>
    <StackLayout row="2" style="text-align: center;" color="white" horizontalAlignment="center">
        <label text="{{ 'games.triviaRight' | L }}"></label>
        <label text="{{ rightAnswer }}"></label>
    </StackLayout>
</GridLayout>
