<ScrollView height="100%">
    <FlexboxLayout flexDirection="column" height="400">
        <StackLayout height="70%" margin="0,10">
            <GridLayout class="header secondFontSize" [columns]="languageService.rightToLeft? '*,5*' : '5*,*'">
                <FlexboxLayout style="align-items: center;" [col]="languageService.rightToLeft? 1 : 0"
                    [ngStyle]="{'justify-content': languageService.rightToLeft? 'flex-end' : 'flex-start'}">
                    <label text="{{ 'games.gameRules' | odedI18N:languageService.dummyUpdate }}"></label>
                </FlexboxLayout>
                <SVGImage class="exit" [col]="languageService.rightToLeft? 0 : 1"
                    src="~/assets/icons/times-light.svg" (tap)="exit()">
                </SVGImage>
            </GridLayout>
            <label margin="30 10" class="secondFontSize regularBoldFont"
                text="{{ 'games.landKingText' | odedI18N:languageService.dummyUpdate }}"></label>
        </StackLayout>
        <FlexboxLayout style="flex-direction: column; height: 30%; justify-content: flex-end;" flexDirection="column">
            <FlexboxLayout class="confirm" (tap)="confirm()">
                <label color="white" text="{{ 'labels.OK' | odedI18N:languageService.dummyUpdate }}"></label>
            </FlexboxLayout>
        </FlexboxLayout>
    </FlexboxLayout>
</ScrollView>
