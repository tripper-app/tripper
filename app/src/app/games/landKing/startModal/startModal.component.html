<FlexboxLayout flexDirection="column" height="300">
    <StackLayout margin="30" height="60%">
        <FlexboxLayout class="header" [ngStyle]="{flex-direction: expression}" style="justify-content: space-between;">
            <label text="X" (tap)="exit()"></label>
            <label text="{{ 'login.resetPassword' | L }}"></label>
        </FlexboxLayout>
        <label text="{{ 'login.codeSent' | L }}"></label>
    </StackLayout>
    <FlexboxLayout class="confirm" (tap)="confirm()">
        <label text="{{ 'labels.OK' | L }}"></label>
    </FlexboxLayout>
</FlexboxLayout>
