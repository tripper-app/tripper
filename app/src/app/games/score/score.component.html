<GridLayout [height]="screenHeight" [width]="screenWidth" rows="*,2*,2*">
    <label class="title" text="X" [ngStyle]="{'text-align': rigthToLeft? 'left' : 'right'}" (tap)="exit()"></label>
    <img src="res://icon" row="1"/>
    <StackLayout row="2" style="text-align: center;" horizontalAlignment="center">
        <label class="text" text="{{ 'games.score' | L: gameService.score }}"></label>
    </StackLayout>
</GridLayout>
