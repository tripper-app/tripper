<FlexboxLayout flexDirection="column" style="justify-content: space-between; height: 100%">
    <ScrollView height="87%">
        <StackLayout>
            <FlexboxLayout class="header" style="justify-content: space-between; align-items: center;" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}">
                <label style="font-size: 30;" text="X" (tap)="navigateToFiltersView()"></label>
                <label text="{{ 'hotelsFilters.title' | L }}"></label>
            </FlexboxLayout>
            <StackLayout class="line" marginBottom="20"></StackLayout>
            <GridLayout class="areasGrid" [columns]="leftToRight? '3*,4*,*,*' : '*,*,4*,3*' " (tap)="expandAreas()">
                <StackLayout height="100%" verticalAlignment="center" [col]="leftToRight? 0 : 3">
                    <label textWrap="true" text="{{ 'hotelsFilters.area' | L }}" #area></label>
                </StackLayout>
                <FlexboxLayout [ngStyle]="{'justify-content': leftToRight? 'flex-start' : 'flex-end'}"
                    style="align-items: center;" *ngIf="!areasExpanded" [col]="leftToRight? 1 : 2">
                    <label textWrap="false" class="grayText" [text]="getAreasString()" #areasList></label>
                </FlexboxLayout>
                <img src="res://icon" [col]="leftToRight? 3 : 0" #expandImage />
            </GridLayout>
            <StackLayout height="0" #aresStack>
                <FlexboxLayout *ngFor="let area of areas; let i = index" [height]="areaLineHeight"
                    style="justify-content: space-between; margin: 0 40; font-size: 15;" (tap)="cbArea.toggle()">
                    <CheckBox:CheckBox (checkedChange)="checkChange(area, cbArea.checked)"
                        [(ngModel)]="areasBoolean[i]" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale"
                        #cbArea />
                    <label [text]="area"></label>
                </FlexboxLayout>
            </StackLayout>
            <GridLayout rows="*, *" columns="*, *" style="margin: 30 20;">
                <FlexboxLayout colSpan="2" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}">
                    <RangeSeekBar width="50%" [maxValue]="maxPrice" [maxStartValue]="maxPrice" step="10"
                        class="range-seek-bar" (rangeSeekBarChanged)="rangeSeekBarChanged($event)" #priceBar
                        minRange="100"></RangeSeekBar>
                    <label width="50%" text="{{ 'hotelsFilters.pricePerNight' | L }}"></label>
                </FlexboxLayout>
                <Label style="text-align: right;" text="&#8362; {{finalMaxPrice}}-{{finalMinPrice}}" row="1"
                    col="1"></Label>
            </GridLayout>
            <FlexboxLayout [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" class="filterLine" (tap)="cbPool.toggle()">
                <CheckBox:CheckBox [(ngModel)]="poolCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbPool/>
                <label text="{{ 'hotelsFilters.pool' | L }}"></label>
            </FlexboxLayout>
            <FlexboxLayout [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" class="filterLine" (tap)="cbBreakfast.toggle()">
                <CheckBox:CheckBox [(ngModel)]="breakfastCheck" [fillColor]="mainColor" [scaleX]="scale"
                    [scaleY]="scale" #cbBreakfast/>
                <label text="{{ 'hotelsFilters.breakfast' | L }}"></label>
            </FlexboxLayout>
        </StackLayout>
    </ScrollView>
    <StackLayout verticalAlignment="center" class="search" (tap)="search()">
        <label text="{{ 'springsFilters.search' | L }}"></label>
    </StackLayout>
</FlexboxLayout>
