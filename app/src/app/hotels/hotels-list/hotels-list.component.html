<scrollView width="100%" height="100%">
    <StackLayout>
        <FlexboxLayout height="60" class="header">
            <img height="100%" src="res://icon" (tap)="navigateToFilters()" />
            <label text="{{ 'hotelsList.title' | L }}"></label>
        </FlexboxLayout>
        <StackLayout height="3" marginTop="5" backgroundColor="rgb(233, 236, 220)"></StackLayout>
        <StackLayout width="100%" height="100%" padding="18">
            <WrapLayout orientation="horizontal">
                <StackLayout (tap)="navigateToHotel(hotel)" width="50%" paddingBottom="20"
                    [paddingRight]="i%2==0? 9 : 0" [paddingLeft]="i%2==1? 9 : 0"
                    *ngFor="let hotel of hotelsList; let i = index">
                    <GridLayout height="150">
                        <Carousel [items]="hotel.images" android:indicatorAnimation="scale" indicatorColor="#fff"
                            indicatorColorUnselected="rgba(206, 193, 193, 0.61)" indicatorOffset="0, 20"
                            showIndicator="true">
                            <CarouselItem *ngFor="let item of hotel.images">
                                <AbsoluteLayout>
                                    <ns-waiting-gif top="-50%" left="-127%"></ns-waiting-gif>
                                    <Image (tap)="navigateToHotel(hotel)" [src]="item" width="100%" height="100%"
                                        stretch="fill"></Image>
                                </AbsoluteLayout>
                            </CarouselItem>
                        </Carousel>
                    </GridLayout>
                    <label text="{{hotel.name}}"></label>
                    <label text="{{hotel.city}},{{'hotelsList.startingFrom' | L}}{{hotel.price}} &#8362;"></label>
                </StackLayout>
            </WrapLayout>
        </StackLayout>
    </StackLayout>
</scrollView>
