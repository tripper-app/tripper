<FlexboxLayout flexDirection="column" height="300">
    <StackLayout margin="30" height="60%">
        <FlexboxLayout class="upper">
            <label text="X" (tap)="exit()"></label>
            <label text="{{ 'login.resetPassword' | L }}"></label>
        </FlexboxLayout>
        <label class="email" text="{{ 'labels.email' | L }}"></label>
        <TextField [(ngModel)]="email" keyboardType="email" autocapitalizationType="none" class="input"
            autocorrect="false" returnKeyType="done" (returnPress)="navigateToResetPassword()"></TextField>
        <label text="{{ 'login.codeSent' | L }}"></label>
    </StackLayout>
    <FlexboxLayout class="confirm" (tap)="navigateToResetPassword()">
        <label text="{{ 'labels.OK' | L }}"></label>
    </FlexboxLayout>
</FlexboxLayout>
