<StackLayout>
	<StackLayout height="90%">
		<GridLayout columns="*,*,*" margin="10 20" style="font-size: 25;" height="40">
			<Label class="greyText" width="100%" [ngStyle]="{'text-align': rightToLeft? 'left' : 'right'}" text="X"
				[col]="rightToLeft? 0 : 2" (tap)="exit()"></Label>
			<Label text="{{ 'login.login' | L }}" col="1"></Label>
		</GridLayout>
		<StackLayout style="height: 3; background-color: rgb(185, 185, 190); margin: 10 0"></StackLayout>
		<label class="signUp greyText" text="{{ 'login.dontHaveAccount' | L }}" (tap)="goToSignUp()"></label>
		<StackLayout height="100%" margin="20">
			<label class="title greyText" text="{{ 'labels.email' | L }}"></label>
			<TextField marginBottom="50" [(ngModel)]="user.email" class="input" keyboardType="email" autocorrect="false"
				autocapitalizationType="none" returnKeyType="next" [disabled]="waitingForResponse"></TextField>
			<label class="title greyText" text="{{ 'login.password' | L }}"></label>
			<TextField [(ngModel)]="user.password" class="input" autocorrect="false" secure="true"
				autocapitalizationType="none" returnKeyType="go" (returnPress)="submit()"
				[disabled]="waitingForResponse"></TextField>
				<FlexboxLayout margin="-15 0 30" width="100%" [ngStyle]="{'justify-content': rightToLeft? 'flex-start' : 'flex-end'}">
					<label class="greyText" text="שכחת את הסיסמא?" (tap)="forgotPassword()"></label>
				</FlexboxLayout>
			<button class="loginBtn" text="{{ 'login.login' | L }}" [isEnabled]="!waitingForResponse" (tap)="submit()"></button>
		</StackLayout>
	</StackLayout>
	<FlexboxLayout class="facebook">
		<label text="{{ 'login.loginFacebook' | L }}"></label>
		<img src="res://icon" height="60%" />
	</FlexboxLayout>
</StackLayout>
