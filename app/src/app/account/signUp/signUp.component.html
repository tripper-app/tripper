<StackLayout>
	<GridLayout rows="7*,*">
		<ns-waiting-gif rowSpan="2" *ngIf="waitingForResponse"></ns-waiting-gif>
		<StackLayout height="90%">
			<GridLayout columns="*,*,*" margin="10 20" style="font-size: 25;" height="40">
				<Label width="100%" [ngStyle]="{'text-align': rightToLeft? 'left' : 'right'}" text="X"
					[col]="rightToLeft? 0 : 2" (tap)="exit()"></Label>
				<Label text="{{ 'login.signUp' | L }}" col="1"></Label>
			</GridLayout>
			<StackLayout style="height: 3; background-color: rgb(185, 185, 190); margin: 10 0"></StackLayout>
			<label [isUserInteractionEnabled]="!waitingForResponse" class="haveAccount"
				text="{{ 'login.haveAccount' | L }}" (tap)="navigateToLogin()"></label>
			<StackLayout margin="20">
				<FlexboxLayout justifyContent="space-between" width="100%" height="100%" flexDirection="column">
					<label class="title" text="{{ 'login.userName' | L }}"></label>
					<TextField marginBottom="20" [(ngModel)]="user.userName" class="input" autocorrect="false"
						autocapitalizationType="none" returnKeyType="next" [disabled]="waitingForResponse"></TextField>
					<label class="title" text="{{ 'labels.email' | L }}"></label>
					<TextField marginBottom="20" [(ngModel)]="user.email" class="input" keyboardType="email"
						autocorrect="false" autocapitalizationType="none" returnKeyType="next"
						[disabled]="waitingForResponse"></TextField>
					<label class="title" text="{{ 'login.createPassword' | L }}"></label>
					<TextField marginBottom="20" [(ngModel)]="user.password" class="input" autocorrect="false"
						secure="true" autocapitalizationType="none" returnKeyType="next"
						[disabled]="waitingForResponse"></TextField>
					<label class="title" text="{{ 'login.confirmPassword' | L }}"></label>
					<TextField marginBottom="20" [(ngModel)]="confirmPassword" class="input" autocorrect="false"
						secure="true" autocapitalizationType="none" returnKeyType="go" (returnPress)="submit()"
						[disabled]="waitingForResponse"></TextField>
				</FlexboxLayout>
			</StackLayout>
		</StackLayout>
		<FlexboxLayout row="1" flexDirection="column" style="height: 100%; justify-content: flex-end;">
			<FlexboxLayout class="signUp" (tap)="submit()" [isUserInteractionEnabled]="!waitingForResponse">
				<label text="הרשמה"></label>
			</FlexboxLayout>
		</FlexboxLayout>
	</GridLayout>
</StackLayout>
