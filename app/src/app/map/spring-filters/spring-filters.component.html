<FlexboxLayout class="main">
    <FlexboxLayout flexDirection="column">
        <FlexboxLayout class="header" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}">
            <label style="font-size: 30;" text="X" (tap)="navigateToMap()"></label>
            <label text="{{ 'springsFilters.title' | L }}"></label>
        </FlexboxLayout>
        <StackLayout class="line"></StackLayout>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" (tap)="cbCamping.toggle()">
        <CheckBox:CheckBox [(ngModel)]="campingCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbCamping/>
        <label text="{{ 'springsFilters.camping' | L }}"></label>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" (tap)="cbChildren.toggle()">
        <CheckBox:CheckBox [(ngModel)]="childrenCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbChildren/>
        <label text="{{ 'springsFilters.children' | L }}"></label>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" (tap)="cbWater.toggle()">
        <CheckBox:CheckBox [(ngModel)]="waterCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbWater/>
        <label text="{{ 'springsFilters.water' | L }}"></label>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" (tap)="cbCar.toggle()">
        <CheckBox:CheckBox [(ngModel)]="carCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbCar/>
        <label text="{{ 'springsFilters.car' | L }}"></label>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}" (tap)="cbDepth.toggle()">
        <CheckBox:CheckBox [(ngModel)]="depthCheck" [fillColor]="mainColor" [scaleX]="scale" [scaleY]="scale" #cbDepth/>
        <label text="{{ 'springsFilters.depth' | L }}"></label>
    </FlexboxLayout>
    <FlexboxLayout class="filterLine" [ngStyle]="{'flex-direction': leftToRight? 'row-reverse' : 'row'}">
        <Slider class="slider" [(ngModel)]="sliderValue" minValue="0" maxValue="100"></Slider>
        <label text="{{ 'springsFilters.radius' | L }} {{sliderValue}} KM"></label>
    </FlexboxLayout>
    <StackLayout verticalAlignment="center" class="search" (tap)="search()">
        <label text="{{ 'springsFilters.search' | L }}"></label>
    </StackLayout>
</FlexboxLayout>
