<GridLayout rows="3.5*,3.5*,12*">
    <StackLayout *ngIf="loading" rowSpan="4" class="gif" horizontalAlignment="center"
        verticalAlignment="center">
        <ns-waiting-gif></ns-waiting-gif>
    </StackLayout>
    <maps:mapView (coordinateTapped)="clickOnMap()" row="0" rowSpan="4" [zoom]="defaultZoom"
        (mapReady)="onMapReady(map)" (coordinateLongPress)="coordinateLongPress($event.position)"
        (markerSelect)="clickOnMarker($event.marker)" [latitude]="31.7962994" [longitude]="35.2453993" #map>
    </maps:mapView>
    <FlexboxLayout row="0" class="iconsFlex" style="align-items: flex-end;">
        <StackLayout [height]="singleRowHeight" [width]="singleRowHeight" class="circle" (tap)="openSearchBar()" *ngIf="!searchMode">
            <SVGImage height="42.5%" src="~/assets/icons/search-white.svg">
            </SVGImage>
        </StackLayout>
        <StackLayout [height]="singleRowHeight" [width]="singleRowHeight" class="circle" (tap)="setMyPosition()" *ngIf="!searchMode">
            <SVGImage height="50%" src="~/assets/icons/location-white.svg">
            </SVGImage>
        </StackLayout>
    </FlexboxLayout>
    <GridLayout [height]="singleRowHeight" row="0" width="0" columns="*,3*" class="searchBar" #searchField>
        <SVGImage height="42.5%" marginRight="20" src="~/assets/icons/search-green.svg"></SVGImage>
        <textField col="1" returnKeyType="search" hint="{{ 'map.springSearch' | odedI18N:languageService.dummyUpdate }}" colSpan="2" class="searchField"
            (loaded)="onSearchBarLoaded($event)" (returnPress)="searchByName()"></textField>
    </GridLayout>
    <FlexboxLayout row="1" class="iconsFlex" style="align-items: flex-start;">
        <StackLayout [height]="singleRowHeight" [width]="singleRowHeight" class="circle" (tap)="navigateToFilters()" *ngIf="!searchMode">
            <SVGImage row="1" height="42.5%" src="~/assets/icons/sliders-white.svg">
            </SVGImage>
        </StackLayout>
    </FlexboxLayout>
</GridLayout>
