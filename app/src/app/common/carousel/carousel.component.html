<GridLayout [height]="carouselHeight">
    <Carousel [items]="Images" android:indicatorAnimation="swap" indicatorColor="#FFFFFF"
        indicatorColorUnselected="rgb(153, 157, 160)" indicatorOffset="0, 10" showIndicator="true">
        <CarouselItem *ngFor="let item of Images; let i = index">
            <GridLayout>
                <label  style="font-size: 30; z-index: 4;"></label>
                <ns-waiting-gif></ns-waiting-gif>
                <Image style="z-index: 3;" [src]="showingImage[i]" width="100%" height="100%" stretch="fill" (tap)="click()" #imagesQuery></Image>
            </GridLayout>
        </CarouselItem>
    </Carousel>
</GridLayout>
