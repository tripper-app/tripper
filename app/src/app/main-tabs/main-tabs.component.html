<BottomNavigation [selectedIndex]="selectedPageIndex" (selectedIndexChanged)="pageChange(tabs.selectedIndex)" #tabs>
    <TabStrip [visibility]="tabsVisibility ? 'visible' : 'collapsed'" backgroundColor="white">
        <TabStripItem>
            <Label text="{{ 'labels.account' | L }}"></Label>
            <Image [src]="currentIndex == 0? '~/assets/images/user-bold.png' : '~/assets/images/user-light.png'">
            </Image>
        </TabStripItem>
        <TabStripItem class="special">
            <Label text="{{ 'labels.games' | L }}"></Label>
            <Image [src]="currentIndex == 1? '~/assets/images/dice-bold.png' : '~/assets/images/dice-light.png'"></Image>
        </TabStripItem>
        <TabStripItem class="special" >
            <Label text="{{ 'labels.bnb' | L }}"></Label>
            <Image [src]="currentIndex == 2? '~/assets/images/bed-bold.png' : '~/assets/images/bed-light.png'"></Image>
        </TabStripItem>
        <TabStripItem class="special">
            <Label text="{{ 'labels.map' | L }}"></Label>
            <Image [src]="currentIndex == 3? '~/assets/images/map-bold.png' : '~/assets/images/map-light.png'"></Image>
        </TabStripItem>
    </TabStrip>
    <TabContentItem>
        <GridLayout>
            <ns-login (goToMap)="navigateToMap()" (goToAbout)="navigateToAbout()"></ns-login>
        </GridLayout>
    </TabContentItem>
    <TabContentItem>
        <GridLayout>
            <ns-games></ns-games>
        </GridLayout>
    </TabContentItem>
    <TabContentItem>
        <GridLayout>
            <ns-hotels-list (hideTabs)="tabsVisibility = false" (showTabs)="tabsVisibility = true"></ns-hotels-list>
        </GridLayout>
    </TabContentItem>
    <TabContentItem>
        <GridLayout>
            <ns-map></ns-map>
        </GridLayout>
    </TabContentItem>
    <TabContentItem>
        <GridLayout>
            <ns-about></ns-about>
        </GridLayout>
    </TabContentItem>
</BottomNavigation>
